services:
  cc-toolify:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cc-toolify
    restart: unless-stopped
    ports:
      - "3005:3000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data

