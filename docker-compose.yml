services:
  cc-toolify:
    image: ${IMAGE_NAME:-ghcr.io/q3064416092-source/cc-toolify}:${IMAGE_TAG:-latest}
    container_name: cc-toolify
    restart: unless-stopped
    pull_policy: always
    ports:
      - "3005:3000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data

